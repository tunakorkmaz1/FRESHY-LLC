<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us - Freshy</title>
    <!-- Modern Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Caveat+Brush&family=Inter:wght@400;500;600&family=Outfit:wght@500;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>

<body>

    <!-- Header -->
    <header>
        <div class="container nav-container">
            <a href="index.html" class="logo-container">
                <div class="freshy-badge" style="background: transparent;">
                    <span class="freshy-main">freshy</span>
                    <span class="freshy-sub">Hygienic Wet Wipes</span>
                </div>
            </a>
            <nav>
                <ul>
                    <li><a href="index.html" class="nav-link">Home</a></li>
                    <li><a href="index.html#mission" class="nav-link">Mission</a></li>
                    <li><a href="index.html#gallery" class="nav-link">Gallery</a></li>
                    <li><a href="index.html#partners" class="nav-link">Partners</a></li>
                    <li><a href="contact.html" class="btn active">Contact Us</a></li>
                </ul>
            </nav>
        </div>
    </header>

    <!-- Contact Section -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-container">
                <div class="contact-header">
                    <h1>Get in Touch</h1>
                    <p>Have questions about FRESHY products?<br class="mobile-break"> We'd love to hear from you!</p>
                </div>

                <form id="contactForm" name="contact" method="POST" data-netlify="true" novalidate>
                    <input type="hidden" name="form-name" value="contact" />
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input type="text" id="name" name="name" required placeholder="John Doe">
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input type="email" id="email" name="email" required placeholder="john@example.com">
                    </div>

                    <div class="form-group">
                        <label for="company">Company Name</label>
                        <input type="text" id="company" name="company" required placeholder="Your Business Ltd.">
                    </div>

                    <div class="form-group">
                        <label for="message">Message</label>
                        <textarea id="message" name="message" rows="5" required
                            placeholder="How can we help you?"></textarea>
                    </div>

                    <button type="submit" class="btn submit-btn">Send Message</button>
                </form>

                <div class="contact-email">
                    <p>Or email us directly at: <a href="mailto:info@freshywetwipes.com">info@freshywetwipes.com</a></p>
                </div>
            </div>
        </div>
    </section>

    <!-- Footer -->
    <footer>
        <div class="container">
            <p>&copy; 2025 FRESHY LLC. All rights reserved.</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
